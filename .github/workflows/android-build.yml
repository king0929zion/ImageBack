name: Android Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-debug-apk:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Build Debug APK
        run: gradle --no-daemon assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: soft-minimal-shortcut-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  release-apk:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
      SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
      SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
      SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Read version info
        id: version
        run: |
          VERSION_NAME=$(sed -n 's/.*versionName = "\(.*\)"/\1/p' app/build.gradle.kts | head -n 1)
          VERSION_CODE=$(sed -n 's/.*versionCode = \([0-9]\+\).*/\1/p' app/build.gradle.kts | head -n 1)
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION_NAME" >> "$GITHUB_OUTPUT"

      - name: Decide signing mode
        id: signing_mode
        run: |
          if [ -n "$SIGNING_KEYSTORE_BASE64" ] && [ -n "$SIGNING_STORE_PASSWORD" ] && [ -n "$SIGNING_KEY_ALIAS" ] && [ -n "$SIGNING_KEY_PASSWORD" ]; then
            echo "signed=true" >> "$GITHUB_OUTPUT"
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare signing keystore
        id: signing
        if: steps.signing_mode.outputs.signed == 'true'
        run: |
          echo "$SIGNING_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/imageback-release-signing.jks"
          echo "SIGNING_KEYSTORE_PATH=$RUNNER_TEMP/imageback-release-signing.jks" >> "$GITHUB_ENV"
          echo "SIGNING_STORE_PASSWORD=$SIGNING_STORE_PASSWORD" >> "$GITHUB_ENV"
          echo "SIGNING_KEY_ALIAS=$SIGNING_KEY_ALIAS" >> "$GITHUB_ENV"
          echo "SIGNING_KEY_PASSWORD=$SIGNING_KEY_PASSWORD" >> "$GITHUB_ENV"
          echo "signed=true" >> "$GITHUB_OUTPUT"

      - name: Build signed release APK
        if: steps.signing.outputs.signed == 'true'
        run: gradle --no-daemon assembleRelease

      - name: Build downloadable debug APK
        if: steps.signing.outputs.signed != 'true'
        run: gradle --no-daemon assembleDebug

      - name: Prepare release files
        id: release_files
        run: |
          if [ "${{ steps.signing.outputs.signed }}" = "true" ]; then
            APK_SOURCE=$(echo app/build/outputs/apk/release/*.apk)
            APK_NAME="imageback-${{ steps.version.outputs.version_name }}-release.apk"
            SIGNING_NOTE="Signed release APK"
          else
            APK_SOURCE=$(echo app/build/outputs/apk/debug/*.apk)
            APK_NAME="imageback-${{ steps.version.outputs.version_name }}-debug.apk"
            SIGNING_NOTE="Debug-signed APK. Configure signing secrets to publish release-signed builds."
          fi

          cp "$APK_SOURCE" "$RUNNER_TEMP/$APK_NAME"
          cp RELEASE_NOTES.md "$RUNNER_TEMP/release-notes.md"
          {
            echo
            echo "Version code: ${{ steps.version.outputs.version_code }}"
            echo "Build artifact: $SIGNING_NOTE"
            echo "Commit: $GITHUB_SHA"
          } >> "$RUNNER_TEMP/release-notes.md"

          echo "apk_path=$RUNNER_TEMP/$APK_NAME" >> "$GITHUB_OUTPUT"
          echo "notes_path=$RUNNER_TEMP/release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: imageback-${{ steps.version.outputs.version_name }}-apk
          path: ${{ steps.release_files.outputs.apk_path }}
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.version.outputs.tag }}
          name: ImageBack ${{ steps.version.outputs.version_name }}
          bodyFile: ${{ steps.release_files.outputs.notes_path }}
          artifacts: ${{ steps.release_files.outputs.apk_path }}
          allowUpdates: true
          artifactErrorsFailBuild: true
          replacesArtifacts: true
